<!-- D-Bus system-bus policy allowing any user to own/talk to org.wave3.Daemon.
     Only needed if you run wave3-daemon on the system bus (not the default).
     Install with:
       sudo install -Dm644 dbus/org.wave3.Daemon-system.conf \
         /etc/dbus-1/system.d/org.wave3.Daemon.conf
-->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy context="default">
    <allow own="org.wave3.Daemon"/>
    <allow send_destination="org.wave3.Daemon"/>
    <allow receive_sender="org.wave3.Daemon"/>
  </policy>
</busconfig>
