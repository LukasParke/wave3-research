# WirePlumber configuration for the Elgato Wave:3
# Installs to ~/.config/wireplumber/wireplumber.conf.d/
#
# What this does:
#   1. Loads the elgato-wave3.lua script that creates wave3-sink and
#      wave3-null-sink and keeps the mic source active.
#   2. Renames the ALSA capture node to "wave3-source".
#   3. Disables the default ALSA playback node so WirePlumber does not
#      create an extra sink from the headphone PCM.

wireplumber.components = [
  {
    name = elgato-wave3.lua
    type = script/lua
    provides = custom.elgato_wave3
  }
]

wireplumber.profiles = {
  main = {
    custom.elgato_wave3 = required
  }
}

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-Elgato_Systems_Elgato_Wave_3_*"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_input.usb-Elgato_Systems_Elgato_Wave_3_*"
      }
    ]
    actions = {
      update-props = {
        node.name = "wave3-source"
        node.description = "Wave:3 Microphone"
      }
    }
  }
]
