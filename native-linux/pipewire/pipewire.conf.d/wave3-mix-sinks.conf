# PipeWire virtual mix sinks for the Elgato Wave:3
#
# Drop this file into /etc/pipewire/pipewire.conf.d/ or
# ~/.config/pipewire/pipewire.conf.d/ and restart PipeWire.
#
# Topology (hardware source/sink are created by the WirePlumber script):
#
#   App audio -> wave3-stream-mix -> recording apps / OBS
#   App audio -> wave3-chat-mix  -> chat/voice apps
#   wave3-monitor               -> direct headphone monitor passthrough
#
# Recommended full routing with the WirePlumber elgato-wave3.lua script:
#
#   App -> wave3-channel-sink -> stream-vol-filter -> wave3-stream-mix -> capture
#                            -> monitor-vol-filter -> wave3-monitor-mix -> wave3-sink
#   wave3-source -> wave3-mic-mix -> wave3-stream-mix + wave3-monitor-mix

context.objects = [
    {
        factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "wave3-stream-mix"
            node.description = "Wave:3 Stream Mix"
            media.class      = "Audio/Sink"
            audio.channels   = 2
            audio.position   = "FL,FR"
            monitor.channel-volumes = true
            monitor.passthrough     = true
            node.autoconnect = false
            session.suspend-timeout-seconds = 0
        }
    }
    {
        factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "wave3-chat-mix"
            node.description = "Wave:3 Chat Mix"
            media.class      = "Audio/Sink"
            audio.channels   = 2
            audio.position   = "FL,FR"
            monitor.channel-volumes = true
            monitor.passthrough     = true
            node.autoconnect = false
            session.suspend-timeout-seconds = 0
        }
    }
    {
        factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "wave3-monitor-mix"
            node.description = "Wave:3 Monitor Mix"
            media.class      = "Audio/Sink"
            audio.channels   = 2
            audio.position   = "FL,FR"
            monitor.channel-volumes = true
            monitor.passthrough     = true
            node.autoconnect = false
            session.suspend-timeout-seconds = 0
        }
    }
]
